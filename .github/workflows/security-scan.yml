name: security-scan

on:
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    if: github.repository_owner == 'MiroMindAI'
    name: security scan
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Run bandit security check
      run: |
        uv tool run bandit@1.7.10 -r ./apps ./libs -f json -o bandit-report.json
      continue-on-error: true

    - name: Run ruff security checks
      run: |
        uv tool run ruff@0.8.0 check --select S ./apps ./libs

    - name: Run pip-audit
      run: |
        cd apps/miroflow-agent && uv pip install --frozen-lockfile pip-audit 2>/dev/null || true
        uv tool run pip-audit -r apps/miroflow-agent/pyproject.toml --fail-on=all || true
      continue-on-error: true

    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: bandit-results
        path: bandit-report.json
        retention-days: 7

    - name: Check for vulnerabilities in uv.lock files
      run: |
        echo "=== Scanning dependency files ==="
        find . -name "uv.lock" -exec echo "Checking {}" \; -exec grep -l "name\|version" {} \; 2>/dev/null | head -20