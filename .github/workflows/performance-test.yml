name: performance-test

on:
  pull_request:
    branches: [ "main" ]

jobs:
  performance-test:
    if: github.repository_owner == 'MiroMindAI'
    name: performance test
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.10

    - name: Run benchmark
      run: |
        cd apps/miroflow-agent
        uv sync
        # Run a small subset of benchmark for performance tracking
        uv run python src/benchmark.py --conf conf/benchmark/debug.yaml